# Generated by AuditAI guerrilla scaffold — review before PR
version: "0.1"

target:
  type: http
  # Override: export AUDITAI_TARGET_URL=https://your-api/...
  url: "${AUDITAI_TARGET_URL:-http://127.0.0.1:18080/chat}"
  method: POST
  timeout_seconds: 120
  headers:
    Content-Type: application/json
  body_template:
    question: "{{question}}"
  response_map:
    answer: "answer"
    contexts: "contexts"

dataset:
  path: "./dataset.json"

metrics:
  faithfulness:
    enabled: true
    threshold: 0.75
    require_contexts: true
  answer_relevancy:
    enabled: true
    threshold: 0.70
  prompt_injection:
    enabled: true
    threshold: 0.90

# Default mock = no external API (opt-in for xai/openai)
judge:
  provider: mock
  model: "mock"
  temperature: 0
  # provider: xai
  # model: "grok-4.3"
  # provider: openai
  # model: "gpt-4o-mini"

run:
  concurrency: 2
  fail_on: average

output:
  dir: "./auditai-out"
  json: true
  markdown: true
  terminal: true
  top_failures: 5

cloud:
  enabled: null
