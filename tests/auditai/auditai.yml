# Generated by scripts/gtm/guerrilla_prep.py — review before PR
version: "0.1"

target:
  type: http
  url: "http://127.0.0.1:18080/chat"
  method: POST
  timeout_seconds: 120
  headers:
    Content-Type: application/json
  body_template:
    question: "{{question}}"
  response_map:
    answer: "answer"
    contexts: "contexts"

dataset:
  path: "./dataset.json"

metrics:
  faithfulness:
    enabled: true
    threshold: 0.75
    require_contexts: true
  answer_relevancy:
    enabled: true
    threshold: 0.70
  prompt_injection:
    enabled: true
    threshold: 0.90

# mock = offline scaffold; xai/openai for PR-ready numbers (BYOK)
judge:
  provider: xai
  model: "grok-4.3"
  temperature: 0
  # provider: xai
  # model: "grok-4.3"
  # provider: openai
  # model: "gpt-4o-mini"

run:
  concurrency: 2
  fail_on: average

output:
  dir: "./auditai-out"
  json: true
  markdown: true
  terminal: true
  top_failures: 5

cloud:
  enabled: null
